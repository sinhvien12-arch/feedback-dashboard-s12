<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin View</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC2yVRWas8VKMi37jrhYvTHPHmu0FXQ-OI",
      authDomain: "group12-23ab1.firebaseapp.com",
      projectId: "group12-23ab1",
      storageBucket: "group12-23ab1.firebasestorage.app",
      messagingSenderId: "863992441673",
      appId: "1:863992441673:web:a13b2cbc0e2180e1594898",
      measurementId: "G-LS927KG9CS",
    });
    const db = firebase.firestore();
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <script src="../shared/navbar.js"></script>

  <main class="max-w-5xl mx-auto mt-8 px-4 pb-16">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Admin View</h1>
      <button
        id="exportBtn"
        class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors"
      >
        Export CSV
      </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl shadow p-5 mb-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">Location</label>
          <select id="filterLocation" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">All</option>
            <option value="District 1">District 1</option>
            <option value="District 3">District 3</option>
            <option value="Thao Dien">Thao Dien</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">Min Rating</label>
          <select id="filterMinRating" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="1">1 ★ and above</option>
            <option value="2">2 ★ and above</option>
            <option value="3">3 ★ and above</option>
            <option value="4">4 ★ and above</option>
            <option value="5">5 ★ only</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">From Date</label>
          <input id="filterFrom" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wide">To Date</label>
          <input id="filterTo" type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" />
        </div>
      </div>
    </div>

    <!-- Count line -->
    <p id="countLine" class="text-sm text-gray-500 mb-3">Loading…</p>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider">
            <tr>
              <th class="px-4 py-3 text-left whitespace-nowrap">Date</th>
              <th class="px-4 py-3 text-left whitespace-nowrap">Location</th>
              <th class="px-4 py-3 text-left whitespace-nowrap">Rating</th>
              <th class="px-4 py-3 text-left whitespace-nowrap">Name</th>
              <th class="px-4 py-3 text-left">Comment</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    let allEntries = [];

    function formatDate(isoStr) {
      const d = new Date(isoStr);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
    }

    function starsHtml(rating) {
      return '★'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    function rowClass(rating) {
      if (rating <= 2) return 'bg-red-100 text-red-950';
      if (rating === 3) return 'bg-yellow-100 text-yellow-950';
      return 'bg-green-100 text-green-950';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toLocalDateStr(isoStr) {
      const d = new Date(isoStr);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function applyFilters(entries) {
      const loc = document.getElementById('filterLocation').value;
      const minRating = parseInt(document.getElementById('filterMinRating').value, 10);
      const fromVal = document.getElementById('filterFrom').value;
      const toVal = document.getElementById('filterTo').value;

      return entries.filter(e => {
        if (loc && e.location !== loc) return false;
        if (e.rating < minRating) return false;
        const entryLocalDate = toLocalDateStr(e.date);
        if (fromVal && entryLocalDate < fromVal) return false;
        if (toVal && entryLocalDate > toVal) return false;
        return true;
      });
    }

    function render() {
      const sorted = [...allEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
      const filtered = applyFilters(sorted);

      const tbody = document.getElementById('tableBody');
      const countLine = document.getElementById('countLine');

      countLine.textContent = `Showing ${filtered.length} of ${sorted.length} feedbacks`;

      if (sorted.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">No feedback yet</td></tr>`;
        return;
      }

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">No feedback matches your filters</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(e => `
        <tr class="${rowClass(e.rating)}">
          <td class="px-4 py-3 whitespace-nowrap">${formatDate(e.date)}</td>
          <td class="px-4 py-3 whitespace-nowrap">${e.location}</td>
          <td class="px-4 py-3 whitespace-nowrap text-yellow-600 tracking-wider">${starsHtml(e.rating)}</td>
          <td class="px-4 py-3 whitespace-nowrap">${escapeHtml(e.name)}</td>
          <td class="px-4 py-3">${escapeHtml(e.comment)}</td>
        </tr>
      `).join('');
    }

    document.getElementById('exportBtn').addEventListener('click', function () {
      const sorted = [...allEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
      const filtered = applyFilters(sorted);

      if (filtered.length === 0) {
        alert('Nothing to export');
        return;
      }

      const header = ['Date', 'Location', 'Rating', 'Name', 'Comment'];
      const rows = filtered.map(e => [
        formatDate(e.date),
        e.location,
        e.rating,
        e.name,
        `"${e.comment.replace(/"/g, '""')}"`,
      ]);

      const csvContent = '﻿' + [header, ...rows].map(r => r.join(',')).join('\r\n');

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const filename = `feedback-export-${yyyy}-${mm}-${dd}.csv`;

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    ['filterLocation', 'filterMinRating', 'filterFrom', 'filterTo'].forEach(id => {
      document.getElementById(id).addEventListener('change', render);
    });

    // Real-time listener from Firestore
    db.collection('feedbackEntries')
      .orderBy('date', 'desc')
      .onSnapshot(
        function(snapshot) {
          allEntries = snapshot.docs.map(function(doc) {
            return Object.assign({ id: doc.id }, doc.data());
          });
          render();
        },
        function(err) {
          console.error('Firestore error:', err);
          document.getElementById('countLine').textContent = 'Failed to load: ' + err.message;
        }
      );
  </script>
</body>
</html>
