<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Feedback</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <script src="../shared/navbar.js"></script>

  <main class="max-w-xl mx-auto mt-10 px-4">
    <div class="bg-white rounded-2xl shadow p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Submit Your Feedback</h1>

      <form id="feedbackForm" novalidate class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="name">
            Name <span class="text-gray-400 font-normal">(optional)</span>
          </label>
          <input
            id="name"
            type="text"
            placeholder="Your name"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="location">
            Location <span class="text-red-500">*</span>
          </label>
          <select
            id="location"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
          >
            <option value="">— Select location —</option>
            <option value="District 1">District 1</option>
            <option value="District 3">District 3</option>
            <option value="Thao Dien">Thao Dien</option>
          </select>
          <p id="locationError" class="text-red-500 text-xs mt-1 hidden">Please select a location.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Rating <span class="text-red-500">*</span>
          </label>
          <div id="starRowContainer" class="p-3 bg-gray-50 rounded-xl transition-all duration-300 inline-flex flex-col gap-1 w-full border border-gray-100">
            <div id="starRow" class="flex gap-2">
              <button type="button" class="star-btn text-3xl leading-none transition-colors" style="color: #d1d5db;">☆</button>
              <button type="button" class="star-btn text-3xl leading-none transition-colors" style="color: #d1d5db;">☆</button>
              <button type="button" class="star-btn text-3xl leading-none transition-colors" style="color: #d1d5db;">☆</button>
              <button type="button" class="star-btn text-3xl leading-none transition-colors" style="color: #d1d5db;">☆</button>
              <button type="button" class="star-btn text-3xl leading-none transition-colors" style="color: #d1d5db;">☆</button>
            </div>
            <p id="sentimentText" class="text-xs font-medium transition-colors mt-1" style="color: #6b7280;">Chưa chọn đánh giá</p>
          </div>
          <input type="hidden" id="rating" value="" />
          <p id="ratingError" class="text-red-500 text-xs mt-1 hidden">Please select a rating.</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="comment">
            Comment <span class="text-red-500">*</span>
          </label>
          <textarea
            id="comment"
            rows="4"
            placeholder="Share your experience…"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none"
          ></textarea>
          <p id="commentError" class="text-red-500 text-xs mt-1 hidden">Comment is required.</p>
        </div>

        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition-colors text-sm"
        >
          Submit Feedback
        </button>
      </form>

      <div id="successMsg" class="hidden mt-5 bg-green-50 border border-green-300 text-green-700 rounded-lg px-4 py-3 text-sm text-center">
        ✅ Thank you! Your feedback has been submitted successfully.
      </div>
    </div>
  </main>

  <script>
    const starRow = document.getElementById('starRow');
    const container = document.getElementById('starRowContainer');
    const sentimentText = document.getElementById('sentimentText');
    const stars = Array.from(document.querySelectorAll('.star-btn'));
    const ratingInput = document.getElementById('rating');
    let currentRating = 0;

    // Hàm cập nhật màu sắc ngôi sao VÀ màu nền cảm xúc (Sentiment Color) dựa trên số sao
    function updateStarsAndSentiment(ratingValue) {
      // 1. Xác định màu sắc chủ đạo của cảm xúc (Màu sao, màu chữ, màu nền)
      let starColor = '#d1d5db'; // Mặc định xám
      let bgColor = '#f9fafb';   // Mặc định xám nhạt bg-gray-50
      let textColor = '#6b7280'; // Mặc định text-gray-500
      let statusLabel = 'Chưa chọn đánh giá';

      if (ratingValue > 0) {
        if (ratingValue <= 2) {
          starColor = '#dc2626';  // Sao màu đỏ (red-600)
          bgColor = '#fee2e2';    // Nền đỏ nhạt (bg-red-100)
          textColor = '#450a0a';  // Chữ đỏ đậm tương phản (text-red-950)
          statusLabel = `Tiêu cực (${ratingValue} sao)`;
        } else if (ratingValue === 3) {
          starColor = '#ca8a04';  // Sao màu vàng sậm (yellow-600)
          bgColor = '#fef9c3';    // Nền vàng nhạt (bg-yellow-100)
          textColor = '#422006';  // Chữ nâu/vàng đậm (text-yellow-950)
          statusLabel = `Trung lập (${ratingValue} sao)`;
        } else {
          starColor = '#16a34a';  // Sao màu xanh lá (green-600)
          bgColor = '#dcfce7';    // Nền xanh nhạt (bg-green-100)
          textColor = '#052e16';  // Chữ xanh lá đậm (text-green-950)
          statusLabel = `Tích cực (${ratingValue} sao)`;
        }
      }

      // 2. Cập nhật màu nền và chữ của toàn bộ khung chứa
      container.style.backgroundColor = bgColor;
      sentimentText.style.color = textColor;
      sentimentText.textContent = statusLabel;

      // 3. Đổi ký tự và màu sắc từng ngôi sao theo mốc tương ứng
      stars.forEach((star, index) => {
        if (index < ratingValue) {
          star.textContent = '★';
          star.style.color = starColor; // Đồng bộ màu sắc sao theo nhóm cảm xúc
        } else {
          star.textContent = '☆';
          star.style.color = '#d1d5db'; // Ngôi sao chưa chọn giữ màu xám nhạt
        }
      });
    }

    // Gán sự kiện di chuột và click lên các nút sao cố định
    stars.forEach((star, index) => {
      const starValue = index + 1;

      // Khi di chuột qua ngôi sao
      star.addEventListener('mouseover', () => {
        updateStarsAndSentiment(starValue);
      });

      // Khi click chuột chọn ngôi sao
      star.addEventListener('click', (e) => {
        e.preventDefault();
        currentRating = starValue;
        ratingInput.value = String(starValue);
        updateStarsAndSentiment(currentRating); // Khóa cứng hiển thị màu sắc cảm xúc
        document.getElementById('ratingError').classList.add('hidden'); // Ẩn lỗi đỏ lập tức
      });
    });

    // Khi di chuột ra khỏi vùng chứa bảng sao, trả về trạng thái cảm xúc đã click chọn
    container.addEventListener('mouseleave', () => {
      updateStarsAndSentiment(currentRating);
    });


    // --- Thực hiện gửi Form ---
    document.getElementById('feedbackForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const location = document.getElementById('location').value;
      const rating = currentRating;   
      const comment = document.getElementById('comment').value.trim();

      let valid = true;

      // Kiểm tra ô địa điểm
      if (!location) {
        document.getElementById('locationError').classList.remove('hidden');
        valid = false;
      } else {
        document.getElementById('locationError').classList.add('hidden');
      }

      // Kiểm tra số sao chọn
      if (rating === 0) {
        document.getElementById('ratingError').classList.remove('hidden');
        valid = false;
      } else {
        document.getElementById('ratingError').classList.add('hidden');
      }

      // Kiểm tra bình luận
      if (!comment) {
        document.getElementById('commentError').classList.remove('hidden');
        valid = false;
      } else {
        document.getElementById('commentError').classList.add('hidden');
      }

      if (!valid) return;

      // Tạo object dữ liệu
      const entry = {
        date: new Date().toISOString(),
        name: name || 'Anonymous',
        location,
        rating: parseInt(rating, 10),
        comment,
      };

      // Đẩy mảng dữ liệu vào localStorage
      const existing = JSON.parse(localStorage.getItem('feedbackEntries') || '[]');
      existing.push(entry);
      localStorage.setItem('feedbackEntries', JSON.stringify(existing));

      // Reset form sạch sẽ sau khi thành công
      this.reset();
      currentRating = 0;
      ratingInput.value = '';
      updateStarsAndSentiment(0); // Trả toàn bộ màu nền và sao về mặc định ban đầu

      // Hiện hộp thông báo xanh lá thành công
      const msg = document.getElementById('successMsg');
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 4000);
    });
  </script>
</body>
</html>
